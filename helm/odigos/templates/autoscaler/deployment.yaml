{{ $imageTag := .Values.image.tag | default .Chart.AppVersion }}
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/name: odigos-autoscaler
    odigos.io/system-object: "true"
  name: {{ .Values.autoscaler.deploymentName | default "odigos-autoscaler" }}
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: odigos-autoscaler
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
      labels:
        app.kubernetes.io/name: odigos-autoscaler
    spec:
      {{- if .Values.autoscaler.nodeSelector }}
      # Component-specific nodeSelector (overrides global values.yaml nodeSelector)
      nodeSelector:
      {{- toYaml .Values.autoscaler.nodeSelector | nindent 8 }}
      {{- else if .Values.nodeSelector }}
      # Global nodeSelector from values.yaml
      nodeSelector:
      {{- toYaml .Values.nodeSelector | nindent 8 }}
      {{- end }}
      {{- if .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
      {{- range .Values.topologySpreadConstraints }}
        - maxSkew: {{ .maxSkew }}
          topologyKey: {{ .topologyKey | quote }}
          whenUnsatisfiable: {{ .whenUnsatisfiable | quote }}
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: odigos-autoscaler
      {{- end }}
      {{- end }}
      {{- if .Values.autoscaler.priorityClassName }}
      priorityClassName: {{ .Values.autoscaler.priorityClassName }}
      {{- end }}
      containers:
      - args:
          - --health-probe-bind-address=:8081
          - --metrics-bind-address=0.0.0.0:8080
          - --leader-elect
        command:
          - /app
        image: {{ template "utils.imageName" (dict "Values" .Values "Component" "autoscaler" "Tag" $imageTag) }}
        env:
          {{- if .Values.autoscaler.deploymentName }}
          - name: ODIGOS_COMPONENT_DEPLOYMENT_NAME
            value: {{ .Values.autoscaler.deploymentName | quote }}
          {{- end }}
          - name: OTEL_SERVICE_NAME
            value: auto-scaler
          - name: CURRENT_NS
            valueFrom:
              fieldRef:
                fieldPath: metadata.namespace
          - name: ODIGOS_LOG_LEVEL
            value: {{ .Values.autoscaler.logLevel | default .Values.logLevel | default "info" | quote }}
          - name: ODIGOS_VERSION
            valueFrom:
              configMapKeyRef:
                key: ODIGOS_VERSION
                name: odigos-deployment
          - name: ODIGOS_COLLECTOR_IMAGE
            value: '{{ template "utils.imageName" (dict "Values" .Values "Component" "collector" "Tag" $imageTag) }}'
          {{- if .Values.autoscaler.profileVerificationOtlpEndpoint }}
          - name: PROFILE_VERIFICATION_OTLP_ENDPOINT
            value: {{ .Values.autoscaler.profileVerificationOtlpEndpoint | quote }}
          {{- end }}
          {{- if .Values.autoscaler.profilesOtlpEndpointUI }}
          - name: PROFILES_OTLP_ENDPOINT_UI
            value: {{ .Values.autoscaler.profilesOtlpEndpointUI | quote }}
          {{- end }}
          {{- if .Values.autoscaler.profilesDebugExport }}
          - name: PROFILE_DEBUG_EXPORT
            value: "true"
          {{- end }}
          {{- if or .Values.autoscaler.profileVerificationOtlpEndpoint .Values.autoscaler.profilesOtlpEndpointUI }}
          {{- $retry := .Values.autoscaler.profilesExporterRetry | default dict }}
          - name: PROFILES_EXPORTER_TIMEOUT
            value: {{ .Values.autoscaler.profilesExporterTimeout | default "120s" | quote }}
          - name: PROFILES_EXPORTER_RETRY_ENABLED
            {{- if (default true $retry.enabled) }}
            value: "true"
            {{- else }}
            value: "false"
            {{- end }}
          - name: PROFILES_EXPORTER_RETRY_INITIAL_INTERVAL
            value: {{ $retry.initialInterval | default "5s" | quote }}
          - name: PROFILES_EXPORTER_RETRY_MAX_INTERVAL
            value: {{ $retry.maxInterval | default "30s" | quote }}
          - name: PROFILES_EXPORTER_RETRY_MAX_ELAPSED_TIME
            value: {{ $retry.maxElapsedTime | default "5m" | quote }}
          {{- end }}
          - name: GOMEMLIMIT
            value: {{ include "odigos.gomemlimitFromResources" (dict "Resources" .Values.autoscaler.resources) }}
        envFrom:
          - configMapRef:
              name: odigos-own-telemetry-otel-config
              optional: true
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          periodSeconds: 10
          timeoutSeconds: 5
        name: manager
        volumeMounts:
          - name: autoscaler-webhooks-cert
            mountPath: /tmp/k8s-webhook-server/serving-certs
            readOnly: true
        resources:
{{ toYaml .Values.autoscaler.resources | indent 10 }}
        securityContext:
          allowPrivilegeEscalation: false
      securityContext:
        runAsNonRoot: true
      serviceAccountName: odigos-autoscaler
      volumes:
        - name: autoscaler-webhooks-cert
          secret:
            secretName: autoscaler-webhooks-cert
            defaultMode: 420
      terminationGracePeriodSeconds: 10
      {{ include "odigos.renderPullSecrets" . | nindent 6 }}
{{- with .Values.autoscaler }}
  {{- if .tolerations }}
      tolerations: {{ toYaml .tolerations | nindent 8 }}
  {{- end }}
  {{- if .affinity }}
      affinity: {{ toYaml .affinity | nindent 8 }}
  {{- end }}
{{- end }}
