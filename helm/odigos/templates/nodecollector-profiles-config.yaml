{{- $useFilter := and (.Values.collectorNode.profiles.filterUnattributedOnly) (not .Values.collectorNode.profiles.config) }}
{{- $useSamplesPerSecond := .Values.collectorNode.profiles.samplesPerSecond }}
{{- if or .Values.collectorNode.profiles.config $useFilter $useSamplesPerSecond }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: odigos-node-collector-profiles-config
  namespace: {{ .Release.Namespace | quote }}
  labels:
    odigos.io/system-object: "true"
data:
  profiles: |
{{- if .Values.collectorNode.profiles.config }}
{{ .Values.collectorNode.profiles.config | indent 4 }}
{{- else }}
    # Profiles config: k8sattributes + service.name. Filter for unattributed profiles disabled (collector v0.141
    # does not accept profiles.include; use profile_conditions/OTTL in a newer collector if needed).
    processors:
      k8sattributes/profiles:
        auth_type: serviceAccount
        extract:
          labels:
          - key: app.kubernetes.io/name
            tag_name: service.name
          - key: app
            tag_name: service.name
          # Include container.* so processor populates container ID index (ByID) for pod_association by container.id (contrib #43689)
          metadata:
          - k8s.pod.name
          - k8s.namespace.name
          - k8s.deployment.name
          - k8s.statefulset.name
          - k8s.daemonset.name
          - k8s.node.name
          - k8s.container.name
          - container.id
        filter:
          node_from_env_var: NODE_NAME
        passthrough: false
        pod_association:
        - sources:
          - from: resource_attribute
            name: container.id
        - sources:
          - from: connection
      resource/profiles-service-name:
        attributes:
        - action: insert
          from_attribute: k8s.deployment.name
          key: service.name
        - action: insert
          from_attribute: k8s.statefulset.name
          key: service.name
        - action: insert
          from_attribute: k8s.daemonset.name
          key: service.name
    service:
      pipelines:
        profiles:
          receivers:
          - profiling
          - otlp/in
          processors:
          - memory_limiter
          - resource/node-name
          - resourcedetection
          - k8sattributes/profiles
          - resource/profiles-service-name
          exporters:
          - otlp/out-cluster-collector-profiles
{{- end }}
{{- if $useSamplesPerSecond }}
  profilingReceiver: |
    samples_per_second: {{ .Values.collectorNode.profiles.samplesPerSecond }}
{{- end }}
{{- end }}
