apiVersion: odigos.io/v1alpha1
kind: Action
metadata:
  name: url-templatization-test
  namespace: default
spec:
  signals:
    - TRACES
  urlTemplatization:
    templatizationRulesGroups:
      - filterProgrammingLanguage: php
        templatizationRules:
          - template: "/rate/{currency-pair}"
      - filterProgrammingLanguage: ruby
        templatizationRules:
          - template: "/location/{currency}"
