apiVersion: v1
kind: Service
metadata:
  name: ui
  namespace: '{{ .Release.Namespace }}'
  labels:
    app.kubernetes.io/name: odigos-ui
    odigos.io/system-object: "true"
spec:
  ports:
    - name: ui
      port: 3000
    - name: otlp
      port: 4317
    {{- $prof := .Values.profiling | default dict }}
    {{- $profUi := $prof.ui | default dict }}
    {{- $legacyProf := .Values.ui.profiling | default dict }}
    {{- $profOn := or (default false $prof.enabled) (default false $legacyProf.enabled) }}
    {{- if $profOn }}
    - name: otlp-profiles
      port: {{ default (default 4318 $legacyProf.otlpGrpcPort) $profUi.otlpGrpcPort }}
      targetPort: otlp-profiles
    {{- end }}
  selector:
    app: odigos-ui
